<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{series}}: {{title}} — Blockspace Forum</title>
  <meta property="og:type" content="article">
  <meta property="og:title" content="{{series}}: {{title}} — Blockspace Forum">
  <meta property="og:description" content="{{subtitle}}">
  <meta property="og:image" content="{{site_url}}/assets/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@blockspaceforum">
  <meta name="twitter:title" content="{{series}}: {{title}} — Blockspace Forum">
  <meta name="twitter:description" content="{{subtitle}}">
  <meta name="twitter:image" content="{{site_url}}/assets/og-image.png">
  <meta name="description" content="{{subtitle}}">
  <link rel="canonical" href="{{site_url}}/{{page_path}}">
  <link rel="icon" href="{{base}}assets/favicon.ico">
  <link rel="apple-touch-icon" href="{{base}}assets/apple-touch-icon.png">
  <link rel="stylesheet" href="{{base}}css/style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": "{{series}}: {{title}}",
    "description": "{{subtitle}}",
    "author": {
      "@type": "Organization",
      "name": "Blockspace Forum",
      "url": "{{site_url}}"
    },
    "publisher": {
      "@type": "Organization",
      "name": "Blockspace Forum",
      "url": "{{site_url}}"
    },
    "mainEntityOfPage": "{{site_url}}/{{page_path}}",
    "isPartOf": {
      "@type": "CreativeWork",
      "name": "PBS Learning Series"
    }
  }
  </script>
</head>
<body data-base="{{base}}">
  <nav id="site-nav"></nav>

  <main class="container container--narrow">
    <article>
      <header class="post-header">
        <div class="post-meta">{{series}}</div>
        <h1>{{title}}</h1>
        <p class="post-subtitle">{{subtitle}}</p>
      </header>

      <div class="post-content">
        {{content}}
      </div>

      <nav class="learn-nav">
        {{prev_link}}
        {{next_link}}
      </nav>
    </article>
  </main>

  <footer id="site-footer"></footer>

  <script src="{{base}}generated/config.js"></script>
  <script src="{{base}}js/main.js"></script>
</body>
</html>

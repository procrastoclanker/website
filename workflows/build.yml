name: Build Site

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'templates/**'
      - 'build.py'
  pull_request:
    branches: [main]
    paths:
      - 'content/**'
      - 'templates/**'
      - 'build.py'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml markdown

      - name: Build site
        run: python3 build.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet learn/ config.js index.html learn.html events.html research.html blog.html sitemap.xml || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit built files
        if: steps.changes.outputs.changed == 'true' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add learn/ config.js index.html learn.html events.html research.html blog.html sitemap.xml
          git commit -m "build: auto-generate site from content changes"
          git push
